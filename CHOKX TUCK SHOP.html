function getCategory(name){
  const lower = name.toLowerCase();

  if(/\b(tea|coca cola|sprite|stoney|fanta|cappy|twist|energy drinks|energy drink|schweppes|taxi|ntsu|shibobo|fusion|caesar blue|derby|juice|malt)\b/.test(lower)){
    return 'Beverages';
  }

  if(/\b(sugar|salt|vinegar|baking powder|maize meal|mala|samp|rice|beans|tomato sauce|mayonnaise|spirit vinegar|pan|ketchup|corned meat|tangy mayonnaise|margarine|soup|bulk|eggs)\b/.test(lower)){
    return 'Staples & Condiments';
  }

  if(/\b(lucky star|koo beans|bull brand|canned|tomato|mayonnaise|soup|corned meat)\b/.test(lower)){
    return 'Canned & Sauces';
  }

  if(/\b(robertsons|benny|peri peri|barbecue|spicy|bicarbonate|tangy|mayonnaise)\b/.test(lower)){
    return 'Seasonings & Spices';
  }

  if(/\b(cake|chips|mamas|popcorn|glucose|softy|chippa|biscuit)\b/.test(lower)){
    return 'Snacks';
  }

  if(/\b(vicks|disprin|med-lemon|grand-pa|protex|colgate|vaseline|playboy roll-on|sunlight soap)\b/.test(lower)){
    return 'Health & Personal Care';
  }

  if(/\b(soap|washing powder|dishwashing|doom|insect|coils|single ply|toilet paper|methylated spirits|shoe polish|parrot meth)\b/.test(lower)){
    return 'Home & Cleaning';
  }

  if(/\b(chicken|heads & feet|neck|soup pack|goldi)\b/.test(lower)){
    return 'Meat & Poultry';
  }

  if(/\b(onion|tomato|eggs)\b/.test(lower)){
    return 'Fresh Produce';
  }

  return 'General';
}

products.forEach(p => {
  p.category = getCategory(p.name);
});

const categories = ["All Needs", ...new Set(products.map(p => p.category))];

let cart = [];

function loadProducts(filteredProducts = products){
  const div = document.getElementById("products");
  div.innerHTML = "";

  filteredProducts.forEach((p,i)=>{
    const originalIndex = products.indexOf(p);
    const imageUrl = p.img || 'https://via.placeholder.com/260x160?text=No+Image';

    div.innerHTML += `
      <div class="product">
        <img src="${imageUrl}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/260x160?text=No+Image'">
        <h3>${p.name}</h3>
        <p class="category">${p.category || 'General'}</p>
        <p class="price">R${p.price.toFixed(2)}</p>
        <div class="actions">
          <button onclick="add(${originalIndex})">Add</button>
        </div>
      </div>
    `;
  });
}

function populateCategorySelect(){
  const select = document.getElementById("categorySelect");
  select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join("");
}

function searchProducts(){
  const searchTerm = document.getElementById("searchInput").value.toLowerCase();
  const selectedCategory = document.getElementById("categorySelect").value;

  const filtered = products.filter(p => {
    const matchesName = p.name.toLowerCase().includes(searchTerm);
    const matchesCategory = p.category.toLowerCase().includes(searchTerm);
    const categoryFilter = selectedCategory === "All Needs" || p.category === selectedCategory;
    return categoryFilter && (matchesName || matchesCategory);
  });

  loadProducts(filtered);
}

function add(i){
  const item = products[i];
  const existing = cart.find(p => p.name === item.name);

  if(existing){
    existing.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  renderCart();
}

function renderCart(){
  let html="";
  let total=0;

  cart.forEach((p,i)=>{
    total += p.price * p.qty;

    html += `
      <strong>${p.name}</strong><br>
      Qty:
      <button onclick="changeQty(${i},-1)">-</button>
      ${p.qty}
      <button onclick="changeQty(${i},1)">+</button>

      <br>
      Subtotal: R${p.price * p.qty}
      <button onclick="removeItem(${i})">Remove</button>
      <hr>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;
}

function changeQty(i,val){
  cart[i].qty += val;
  if(cart[i].qty <= 0) cart.splice(i,1);
  renderCart();
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

function checkout(){
  document.getElementById("checkoutBox").style.display="block";
}

function placeOrder(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !email || !address){
    alert("Fill all fields");
    return;
  }

  const orderID = "ORD-"+Date.now();
  const total = cart.reduce((s,i)=>s + (i.price*i.qty),0);

  const orderText = cart.map(i =>
    `${i.name} x${i.qty} - R${i.price*i.qty}`
  ).join("\n");

  // EMAIL TO YOU
  document.getElementById("message").value =
`Order ID: ${orderID}

Name: ${name}
Email: ${email}
Address: ${address}
whatsapp: ${phone}

${orderText}

Total: R${total}`;

  document.getElementById("orderForm").submit();

  // WHATSAPP
  const msg = encodeURIComponent(
`🛒 Order ${orderID}
${name}
${address}

${orderText}

Total: R${total}`
  );

  window.open(`https://wa.me/27633954302?text=${msg}`);

  // PAYMENT BOX
  document.getElementById("paymentBox").style.display="block";
  document.getElementById("paymentBox").innerHTML = `
    <h3>💳 Payment Instructions</h3>
    <p><strong>Order ID:</strong> ${orderID}</p>
    <p>Bank: Capitec</p>
    <p>Account: 1639629090</p>
    <p>Reference: ${orderID}</p>

    <button onclick="sendWhatsApp('${orderID}','${name}','${address}')">
      📲 Send Order via WhatsApp
    </button>

    <h3>📤 Proof of Payment</h3>
    <input type="file">
  `;

  alert("Order placed!");
}

function sendWhatsApp(orderID,name,address){
  const msg = encodeURIComponent(
`Order ${orderID}
${name}
${address}

Please confirm payment.`
  );

  window.open(`https://wa.me/0633954302?text=${msg}`);
}
